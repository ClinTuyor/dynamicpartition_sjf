<body class="bg-white p-10 font-['Nunito']">
    <h1 class="text-center text-4xl font-extrabold text-[#10b981] mb-20">Dynamic Partition - Preemptive SJF Simulator</h1>
    
    <div class="flex justify-between items-start max-w-[1400px] mx-auto gap-20">
        <!-- Input Side -->
        <div class="flex-1">
            <h2 class="text-[#10b981] text-3xl font-bold mb-8 text-center">Process Input</h2>
            <div class="flex gap-4 mb-10">
                <button onclick="addProcess()" class="bg-[#10b981] text-white py-3 rounded-lg font-bold text-lg flex-1">Add Process</button>
                <button onclick="endAll()" class="bg-[#10b981] text-white py-3 rounded-lg font-bold text-lg flex-1">End All Processes</button>
            </div>

            <div class="grid grid-cols-4 gap-4 mb-4 px-2 text-[#10b981] font-bold text-lg">
                <div class="text-center">Process</div>
                <div class="text-center">Arrival Time</div>
                <div class="text-center">Burst Time</div>
                <div></div>
            </div>

            <div id="process-list" class="space-y-4"></div>
            
            <button onclick="window.location.href='/statistics'" class="mt-12 w-full bg-[#10b981] text-white py-4 rounded-xl text-2xl font-bold">Calculate Stats</button>
        </div>

        <!-- Scale Side (3.png exact) -->
        <div class="w-[400px] flex flex-col items-center">
            <div class="w-full bg-white shadow-2xl rounded-sm border border-gray-200 overflow-hidden min-h-[500px] flex flex-col">
                <div class="bg-gray-400 py-1 text-center text-white text-xs font-bold">Kernel</div>
                <div id="cpu-scale" class="flex-grow flex flex-col">
                    <!-- Blocks stack top-down to show memory/partition usage -->
                </div>
            </div>
        </div>
    </div>
</body>
