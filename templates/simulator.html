<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Partition - Preemptive SJF Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="p-10">
    <header class="text-center mb-16">
        <h1 class="text-5xl font-bold text-[#10b981]">Dynamic Partition - Preemptive SJF Simulator</h1>
    </header>
    <div class="grid grid-cols-12 gap-16 max-w-[1700px] mx-auto items-start">
        <div class="col-span-7">
            <h2 class="text-[#10b981] text-4xl font-bold mb-10 text-center">Process Input</h2>
            <div class="flex gap-6 mb-12">
                <button onclick="addProcess()" class="bg-[#10b981] text-white py-4 rounded-2xl font-bold text-2xl flex-1 shadow-md">Add Process</button>
                <button onclick="endAll()" class="bg-[#10b981] text-white py-4 rounded-2xl font-bold text-2xl flex-1 shadow-md">End All Processes</button>
            </div>
            <div class="grid grid-cols-4 gap-4 mb-6 px-4 text-[#10b981] font-bold text-xl uppercase">
                <div>Process</div><div>Arrival Time</div><div>Burst Time</div><div></div>
            </div>
            <div id="process-list" class="space-y-6"></div>
            <button onclick="window.location.href='/statistics'" class="mt-16 w-full bg-[#10b981] py-6 rounded-3xl text-3xl font-bold shadow-xl">Calculate Stats</button>
        </div>
        <div class="col-span-5 flex flex-col items-center">
            <div class="w-80 bg-gray-800 rounded-3xl overflow-hidden border-8 border-gray-700 shadow-2xl min-h-[700px] flex flex-col">
                <div class="bg-gray-500 py-3 text-center text-white font-black tracking-widest">KERNEL</div>
                <div id="cpu-scale" class="flex-grow flex flex-col-reverse"></div>
            </div>
        </div>
    </div>
    <script src="/static/js/script.js"></script>
</body>
</html>
