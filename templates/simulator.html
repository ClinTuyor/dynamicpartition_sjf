<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simulator | SJF-P</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div class="flex gap-4">
                <button onclick="addProcess()" class="bg-blue-600 text-white px-4 py-2 rounded text-xs font-bold">ADD PROCESS</button>
                <button onclick="startSimulation()" class="bg-emerald-600 text-white px-4 py-2 rounded text-xs font-bold">START PROCESS</button>
                <button onclick="endAll()" class="bg-slate-800 text-white px-4 py-2 rounded text-xs font-bold">CLEAR</button>
            </div>
            <button onclick="handleExecution()" class="bg-white text-black px-4 py-2 rounded text-xs font-bold">ANALYTICS</button>
        </div>

        <div class="bg-[#111827] rounded-lg border border-white/5 overflow-hidden mb-12">
            <div id="process-list" class="min-h-[200px]"></div>
        </div>

        <div id="gantt-chart" class="gantt-container"></div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
