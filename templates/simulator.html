<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SJF-P | Simulator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div class="flex gap-4">
                <button onclick="addProcess()" class="bg-blue-600 text-white px-6 py-2 rounded font-bold text-xs">ADD PROCESS</button>
                <button onclick="startSimulation()" class="bg-emerald-600 text-white px-6 py-2 rounded font-bold text-xs">START PROCESS</button>
                <button onclick="endAll()" class="bg-slate-800 text-white px-6 py-2 rounded font-bold text-xs">CLEAR BUFFER</button>
            </div>
            <button onclick="handleExecution()" class="bg-white text-black px-6 py-2 rounded font-bold text-xs">VIEW ANALYTICS</button>
        </div>

        <div class="bg-[#111827] rounded-xl border border-white/5 overflow-hidden mb-12 shadow-2xl">
            <div class="grid grid-cols-[100px_1fr_1fr_60px] gap-4 p-4 border-b border-white/10 bg-white/[0.02] text-[10px] font-bold uppercase tracking-widest text-slate-500">
                <div>Process ID</div><div>Arrival Time</div><div>Burst Time</div><div class="text-right">Action</div>
            </div>
            <div id="process-list" class="max-h-[400px] overflow-y-auto"></div>
        </div>

        <div class="gantt-wrapper">
            <h2 class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-4">Gantt Chart Visualization</h2>
            <div id="gantt-chart" class="gantt-container"></div>
        </div>

<!-- NEW: Project-style Timeline Chart -->
        <div id="project-gantt" class="bg-[#0f172a] rounded-xl border border-white/5 p-8 relative overflow-hidden">
            <!-- The JavaScript INJECTS the bars into THIS div -->
            <div id="timeline-rows" class="space-y-6"></div>
            <div id="time-scale" class="flex justify-between mt-6 pt-6 border-t border-white/10 text-[9px] font-mono text-slate-600"></div>
        </div>

    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
