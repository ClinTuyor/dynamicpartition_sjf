<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>SRTF Scheduler</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .chart-container {
            width: 80%;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <h2>Preemptive SJF (SRTF)</h2>
    <table id="processTable">
        <tr><th>Process ID</th><th>Arrival Time</th><th>Burst Time</th></tr>
        <tr>
            <td><input type="text" class="pid" value="P1" aria-label="Process ID"></td>
            <td><input type="number" step="0.1" class="at" value="0" aria-label="Arrival Time"></td>
            <td><input type="number" step="0.1" class="bt" value="5" aria-label="Burst Time"></td>
        </tr>
    </table>
    <button onclick="addRow()">Add Process</button>
    <button onclick="runSimulation()">Run Simulation</button>

    <div class="chart-container">
        <canvas id="ganttChart"></canvas>
    </div>

    <script>
        let chart;
        function addRow() {
            let table = document.getElementById("processTable");
            let row = table.insertRow(-1);
            row.innerHTML = `<td><input type="text" class="pid" aria-label="Process ID"></td>
                             <td><input type="number" step="0.1" class="at" aria-label="Arrival Time"></td>
                             <td><input type="number" step="0.1" class="bt" aria-label="Burst Time"></td>`;
        }

        async function runSimulation() {
            const pids = document.querySelectorAll('.pid');
            const ats = document.querySelectorAll('.at');
            const bts = document.querySelectorAll('.bt');
            
            let processes = [];
            pids.forEach((p, i) => {
                processes.push({id: p.value, at: Number.parseFloat(ats[i].value), bt: Number.parseFloat(bts[i].value)});
            });

            const response = await fetch('/solve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({processes})
            });
            const data = await response.json();
            drawGantt(data);
        }

        function drawGantt(data) {
            const ctx = document.getElementById('ganttChart').getContext('2d');
            if(chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    datasets: data.map(item => ({
                        label: item.id,
                        data: [{x: [item.start, item.end], y: 'Timeline'}],
                        backgroundColor: 'rgba(54, 162, 235, 0.5)'
                    }))
                },
                options: {
                    indexAxis: 'y',
                    scales: { x: { type: 'linear', position: 'bottom' } },
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.x[0]} - ${ctx.raw.x[1]}` } }
                    }
                }
            });
        }
    </script>
</body>
</html>
