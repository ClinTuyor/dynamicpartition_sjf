<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Dynamic Partition - Preemptive SJF</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="title-container"><h1>DYNAMIC PARTITION - PREEMPTIVE SJF</h1></div>
    
    <div class="container">
        <div class="input-section">
            <h2>Process Input</h2>
            <div class="btn-group">
                <button class="btn-add" onclick="addRow()">Add Process</button>
                <button class="btn-end" onclick="removeAll()">End All Processes</button>
            </div>
            
            <div class="input-header">
                <span>Process</span>
                <span>Arrival Time</span>
                <span>Burst Time</span>
            </div>
            <div id="list"></div>
        </div>

        <div class="visual-section">
            <div id="partition-visual" class="partition-column">
                <div class="kernel-header">Kernel</div>
                </div>
        </div>
    </div>

    <div class="chart-container">
        <h2>Gantt Chart</h2>
        <div id="chart-box">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
