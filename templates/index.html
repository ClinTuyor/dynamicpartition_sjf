<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuyoursTruly SJF-P Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f1a] text-slate-300 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-10">
            <h1 class="text-2xl font-mono font-bold text-white tracking-tighter">SJF-P_SIMULATOR_V2.0</h1>
            <p class="text-slate-500 text-sm">System Ready. Awaiting Process Insertion.</p>
        </header>

        <div class="flex flex-wrap gap-4 mb-8">
            <button onclick="addProcess()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded font-bold text-xs">ADD PROCESS</button>
            <button onclick="startSimulation()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded font-bold text-xs">START PROCESS</button>
            <button onclick="endAll()" class="bg-slate-800 hover:bg-red-900 text-white px-6 py-2 rounded font-bold text-xs">CLEAR BUFFER</button>
            <button onclick="handleExecution()" class="bg-white text-black hover:bg-slate-200 px-6 py-2 rounded font-bold text-xs">GENERATE ANALYTICS</button>
        </div>

        <div class="bg-[#111827] rounded-lg border border-white/5 overflow-hidden">
            <div class="grid grid-cols-[100px_1fr_1fr_60px] gap-4 p-4 border-b border-white/10 bg-white/[0.02] text-[10px] font-bold uppercase tracking-widest text-slate-500">
                <div>ID</div><div>Arrival (ms)</div><div>Burst (ms)</div><div class="text-right">DEL</div>
            </div>
            <div id="process-list"></div>
        </div>

        <div class="mt-12">
            <h2 class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-4">Live Gantt Stream</h2>
            <div id="gantt-chart" class="gantt-container flex items-center justify-center text-slate-600 font-mono text-xs italic">
                Awaiting simulation start...
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
