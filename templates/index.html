<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuyoursTruly | SJF-P Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="flex items-center justify-center min-h-screen bg-[#0b0f1a]">
    <div class="text-center space-y-12 max-w-3xl px-6">
        <header class="space-y-4">
            <div class="inline-block px-4 py-1.5 rounded-full border border-emerald-500/20 bg-emerald-500/5 mb-2">
                <span class="text-[10px] tracking-[0.5em] uppercase text-emerald-500 font-bold">Systems Logic Engine v4.0</span>
            </div>
            <h1 class="text-6xl md:text-7xl font-light tracking-tighter text-slate-200">
                TuyoursTruly <span class="font-bold text-white">SJF-P</span>
            </h1>
            <p class="text-slate-400 font-light text-xl max-w-lg mx-auto leading-relaxed">
                A high-precision monitoring environment for Shortest Remaining Time First (SRTF) CPU scheduling.
            </p>
        </header>

        <div class="flex flex-col sm:flex-row gap-6 justify-center items-center pt-4">
            <a href="/simulator" class="group relative px-12 py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold transition-all shadow-2xl shadow-emerald-900/30 overflow-hidden">
                <span class="relative z-10">Initialize Simulator</span>
                <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
            </a>
            <a href="/about" class="px-12 py-4 border border-slate-800 hover:bg-slate-900 text-slate-400 hover:text-white rounded-xl font-bold transition-all">
                View Documentation
            </a>
        </div>
    </div>
</body>
</html>
