<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Metrics | SJF-P Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="p-12">
    <div class="max-w-6xl mx-auto space-y-10">
        <header class="flex justify-between items-end border-b border-slate-800 pb-8">
            <h1 class="text-3xl font-bold text-white">Execution <span class="text-emerald-500">Analytics</span></h1>
            <a href="/simulator" class="text-xs font-bold text-slate-500 hover:text-white uppercase tracking-widest transition-colors">New Session</a>
        </header>

        <div id="stats-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        const rawData = localStorage.getItem('simulationResults');
        const grid = document.getElementById('stats-grid');

        // Positive logic fix for SonarQube
        if (rawData) {
            const { stats, processes } = JSON.parse(rawData);
            stats.forEach(s => {
                const p = processes.find(proc => proc.name === s.name);
                const card = document.createElement('div');
                card.className = "glass-panel p-6 space-y-6";
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <h3 class="font-mono text-xl font-bold" style="color:${p.color}">${s.name}</h3>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex flex-col">
                            <span class="text-[9px] uppercase text-slate-500 font-bold">Waiting</span>
                            <span class="text-xl text-white">${s.wt}ms</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[9px] uppercase text-slate-500 font-bold">Turnaround</span>
                            <span class="text-xl text-white">${s.tat}ms</span>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
        } else {
            grid.innerHTML = `
                <div class="col-span-full py-20 text-center glass-panel">
                    <p class="text-slate-500 font-mono text-sm uppercase tracking-widest">No active simulation data found.</p>
                </div>`;
        }
    </script>
</body>
</html>
