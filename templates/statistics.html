<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Statistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="p-16">
    <div class="flex justify-between items-start mb-20">
        <h1 class="text-7xl font-bold text-[#10b981]">Statistics</h1>
        <div class="text-gray-300 text-lg space-y-2">
            <p>1. Completion Time: CT = Final execution marker</p>
            <p>2. Turnaround Time: TAT = CT - AT</p>
            <p>3. Waiting Time: WT = TAT - BT</p>
            <p>4. Response Time: RT = First Scheduled - AT</p>
        </div>
    </div>
    <div id="stats-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    <button onclick="window.location.href='/'" class="fixed bottom-12 right-12 bg-[#10b981] text-white px-12 py-5 rounded-2xl text-2xl font-bold shadow-2xl">Quit Simulator</button>
    <script>
        const data = JSON.parse(localStorage.getItem('simulationResults'));
        const grid = document.getElementById('stats-grid');
        data.stats.forEach(s => {
            const p = data.processes.find(proc => proc.name === s.name);
            const card = document.createElement('div');
            card.className = "p-8 rounded-3xl cursor-pointer transition-all hover:scale-105 shadow-xl bg-gray-800 border-l-8";
            card.style.borderLeftColor = p.color;
            card.innerHTML = `
                <h2 class="text-4xl font-bold mb-6" style="color: ${p.color}">${s.name}</h2>
                <div class="grid grid-cols-2 gap-4 text-xl">
                    <p>CT: ${s.ct}</p><p>TAT: ${s.tat}</p><p>WT: ${s.wt}</p><p>RT: ${s.rt}</p>
                </div>
                <div class="hidden mt-6 text-emerald-300 text-sm italic border-t border-gray-600 pt-4">
                    TAT: ${s.ct} - ${s.at} = ${s.tat} | WT: ${s.tat} - ${s.bt} = ${s.wt}
                </div>
            `;
            card.onclick = () => card.querySelector('div:last-child').classList.toggle('hidden');
            grid.appendChild(card);
        });
    </script>
</body>
</html>
